<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="My Digital Card – Kartu nama digital personal yang modern dan minimalis." />
    <title>My Digital Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>

    <!-- Jigsaw Puzzle Background (generated by JS) -->
    <div class="puzzle-bg"></div>

    <div class="card" id="mainCard">
        <img src="profile.png" alt="Foto Profil" class="profile-img" id="profileImg" />
        <h1 class="name">Samuel lyandro Saputra</h1>
        <p class="role">Web Learner</p>
        <hr class="divider" />
        <p class="bio">
            Halo! Saya sedang belajar pengembangan web dan suka membangun
            hal&#8209;hal keren di internet. Mari terhubung! 🚀
        </p>
        <a href="links.html" class="btn btn-primary" id="btnLinks">
            <i class="fa-solid fa-link btn-icon"></i> Lihat Semua Link
        </a>
        <p class="footer" id="footerText">
            &copy; <span id="year"></span> Samuel lyandro Saputra. All rights reserved.
        </p>
    </div>

    <script src="puzzle-bg.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
