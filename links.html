<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Link sosial media dan kontak – My Digital Card." />
    <title>My Links – My Digital Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>

    <!-- Jigsaw Puzzle Background (generated by JS) -->
    <div class="puzzle-bg"></div>

    <div class="card" id="linksCard">
        <img src="profile.png" alt="Foto Profil" class="profile-img" id="profileImg" style="width:90px;height:90px;" />
        <h1 class="name" style="font-size:1.35rem;">Samuel lyandro Saputra</h1>
        <p class="role" style="margin-bottom:24px;">Web Learner</p>

        <div class="links-list">
            <a href="https://wa.me/62895335976374" class="btn btn-whatsapp" target="_blank" rel="noopener noreferrer"
                id="btnWhatsApp">
                <i class="fa-brands fa-whatsapp btn-icon"></i> Chat me on WhatsApp
            </a>
            <a href="https://www.instagram.com/itsamz679/" class="btn btn-instagram" target="_blank"
                rel="noopener noreferrer" id="btnInstagram">
                <i class="fa-brands fa-instagram btn-icon"></i> My Instagram
            </a>
            <a href="https://github.com/LyanDSam" class="btn btn-github" target="_blank" rel="noopener noreferrer"
                id="btnGitHub">
                <i class="fa-brands fa-github btn-icon"></i> My GitHub
            </a>
            <a href="index.html" class="btn btn-back" id="btnBack">
                <i class="fa-solid fa-house btn-icon"></i> Back to Home
            </a>
        </div>

        <p class="footer" id="footerText">
            &copy; <span id="year"></span> Samuel lyandro Saputra. All rights reserved.
        </p>
    </div>

    <script src="puzzle-bg.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
